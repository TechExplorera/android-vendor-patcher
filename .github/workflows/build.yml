name: Vendor.img Safe Patcher

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y e2fsprogs android-sdk-libsparse-utils wget zip

      - name: Setup tools
        run: |
          mkdir -p tools_bin
          cd tools_bin

          wget -O simg2img https://raw.githubusercontent.com/anestisb/android-simg2img/master/simg2img
          wget -O img2simg https://raw.githubusercontent.com/anestisb/android-simg2img/master/img2simg
          chmod +x *

      - name: Prepare workspace
        run: mkdir -p work output

      - name: Load vendor.img
        run: cp input/vendor.img work/

      - name: Convert sparse to raw
        run: |
          cd work
          ../tools_bin/simg2img vendor.img vendor_raw.img

      - name: Mount vendor
        run: |
          mkdir -p work/mnt
          sudo mount -o loop work/vendor_raw.img work/mnt

      - name: Patch fstab only
        run: bash tools/patch_vendor.sh work/mnt

      - name: Sync changes
        run: sync

      - name: Unmount
        run: sudo umount work/mnt

      - name: Repack vendor
        run: |
          cd work
          ../tools_bin/img2simg vendor_raw.img vendor_patched.img

      - name: Package output
        run: |
          mkdir -p output
          cp work/vendor_patched.img output/
          cd output
          zip -r vendor_patched.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vendor_img_patched
          path: output/